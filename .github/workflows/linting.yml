name: Linting 📜 (NumpyDoc, Ruff & Black)
run-name: ${{ github.actor }} - Linting 📜 (NumpyDoc, Ruff & Black)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}-linting
  cancel-in-progress: true

on:
  workflow_call:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ${{ matrix.os }}-latest
    strategy:
      matrix:
        os: [Ubuntu]
        python-version: ["3.13", "3.12"]
        include:
          - os: Windows
            python-version: "3.13"
            if: ${{ github.repository_owner == 'xraysoftmat'}}
          - os: macOS
            python-version: "3.13"
            if: ${{ github.repository_owner == 'xraysoftmat'}}
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpydoc black ruff

    - name: Analysing the code with Ruff
      run: |
        ruff check

    # Leave this here for legacy purposes. Try to use Ruff in the same style as Black.
    # - name: Analysing the code with black
    #   run: |
    #     black --check .

    - name: Analysing the code with numpydoc
      run: | # Exclude test and gui files.
        numpydoc lint --config . $(git ls-files -- '*.py' ':!:*tests/*' ':!:*gui/*')
